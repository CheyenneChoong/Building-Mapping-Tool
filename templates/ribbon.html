<div id="ribbon">
    <input type="text" id="projectTitle" name="projectTitle" onchange="null" value="{{ projectTitle }}"/>
    <div id="fileManage">
        <button onclick="document.getElementById('newProject').style.display = 'flex'">New</button>
        <button onclick="document.getElementById('openProject').style.display = 'flex'">Open</button>
        <button id="help">Help</button>
    </div>
</div>

<script>
    if (document.getElementById("projectTitle").innerHTML != "Untitled Project") {
        document.getElementById("projectTitle").disabled = false;
    } else {
        document.getElementById("projectTitle").disabled = true;
    }
</script>

<div id="newProject">
    <form action="/newProject" method="post">
        <input type="text" name="fileName" placeholder="Project Name" required/>
        <input type="submit" value="Create Project" />
        <button type="button" style="background-color: #DA2D50;" onclick="document.getElementById('newProject').style.display = 'none'">Cancel</button>
    </form>
</div>

<div id="openProject">
    <form action="/openProject" method="post">
        <input type="text" name="fileName" placeholder="Project Name" required/>
        <input type="submit" value="Open Project" />
        <button type="button" style="background-color: #DA2D50" onclick="document.getElementById('openProject').style.display = 'none'">Cancel</button>
        <div id="projectList">
            <strong>Existing Project</strong><br/>
            {{ projectList|safe }}
        </div>
    </form>
</div>
