<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building Mapping Tool</title>
    {% include 'stylesheet.html' %}
</head>

<body>
    {% include 'ribbon.html' %}
    {% include 'nav.html' %}
    <script>
        document.getElementById("export").style.backgroundColor = "#1B66A6";
        document.getElementById("export").style.color = "white";
    </script>

    <div class="panel">
        <div class="card" id="search">
            <strong>Search</strong>
            <form action="/generate" method="post">
                <input type="text" placeholder="Table Name" name="table" required />
                <input type="text" placeholder="Column Name" name="column" required />
                <input type="submit" value="Generate" />
            </form>
        </div>
        <div class="card">
            <form action="/download" method="post"><input type="submit" value="Download JSON" /></form>
        </div>
    </div>

    <div class="container" id="searchOutput">
        <p>{{ generateResult|safe }}</p>
    </div>

    <script>
    </script>
</body>
</html>
